# F1RC.UZ Nginx Deployment Configuration
#
# Ushbu konfiguratsiya production muhitida static assetlarni ishonchli
# keshlash va xavfsizlik (security headers) qoidalarini o'rnatish uchun mo'ljallangan.

server {
    listen 80;
    listen [::]:80;
    server_name f1rc.uz www.f1rc.uz;

    # HTTP dan HTTPS ga yo'naltirish (Strict Redirect)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name f1rc.uz www.f1rc.uz;

    # SSL sertifikat sozlamalari (Productionda yo'lni moslashtiring)
    ssl_certificate /etc/letsencrypt/live/f1rc.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/f1rc.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    root /var/www/f1rc.uz/dist;
    index index.html;

    # Same-origin API proxy prevents mixed-content failures on the HTTPS site.
    location /api/ {
        proxy_pass http://64.226.77.229:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ────────────────────────────────────────────────────────────────
    # Xavfsizlik Sarlavhalari (Security Headers)
    # ────────────────────────────────────────────────────────────────

    # Content Security Policy (CSP)
    # Faqat ruxsat etilgan scriptlar, styles va API endpointlar
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' ws://64.226.77.229:8000 wss://64.226.77.229:8000 http://64.226.77.229:8000 https://64.226.77.229:8000; frame-ancestors 'none'; object-src 'none';" always;

    # Frame options clickjacking oldini olish uchun
    add_header X-Frame-Options "DENY" always;

    # X-Content-Type-Options MIME sniffing oldini oladi
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer policy maxfiylikni ta'minlaydi
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy kamerani va mikrofonni cheklaydi (agar QR scanner kerak bo'lsa camera allowed)
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

    # HTTP Strict Transport Security (HSTS)
    # Faqat HTTPS orqali 1 yil davomida (subdomainlar bilan birga)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ────────────────────────────────────────────────────────────────
    # Cache boshqaruvi va Static Assets
    # ────────────────────────────────────────────────────────────────

    # SPA Router fallback: hamma so'rovlarni index.html ga yo'naltirish
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html - Caching taqiqlanadi (tizim yangilanganda darhol ko'rinsin)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
    }

    # Hashed Assets (js, css, rasmlar, fontlar) - Immutable Cache 1 yil
    location ~* \.(?:css|js|woff2?|eot|ttf|otf|png|jpe?g|gif|webp|svg|ico|mp4)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        access_log off;
    }

    # Error handling
    error_page 404 /index.html;
}
